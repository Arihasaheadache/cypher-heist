<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raft Terminal Command Line</title>
    <style>
        body {
            background-color: black;
            color: #00ff00; /* Classic terminal green */
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            margin: 0;
            font-size: 18px;
            height: 100vh;
            width: 100vw;
            box-sizing: border-box; 
            overflow-y: auto; 
        }

        #terminal-output p, #terminal-output pre {
            margin: 5px 0;
            font-family: 'Courier New', Courier, monospace;
            white-space: pre-wrap; 
        }

        /* Shared class for both input phases */
        .input-line {
            display: none; 
            align-items: center;
            margin-top: 5px;
        }

        .prompt {
            margin-right: 10px;
            white-space: pre; 
        }

        /* Styling for both inputs */
        input[type="text"] {
            background-color: transparent;
            color: #00ff00; /* Default to green */
            border: none;
            outline: none;
            font-family: 'Courier New', Courier, monospace;
            font-size: 18px;
            flex-grow: 1;
        }
    </style>
</head>
<body>

    <div id="terminal-output"></div>
    
    <div id="password-line" class="input-line">
        <span class="prompt">pink@kimchi password:</span>
        <input type="text" id="password-input" style="color: transparent;" autocomplete="off">
    </div>

    <div id="command-line" class="input-line">
        <span class="prompt">pink@kimchi $:</span>
        <input type="text" id="command-input" autocomplete="off">
    </div>

    <script src="script.js"></script>
</body>
</html>
